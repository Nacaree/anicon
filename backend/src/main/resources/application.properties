∫# Server Configuration
server.port=8080
spring.application.name=anicon-backend
spring.config.import=optional:file:.env[.properties]

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings (for better performance with transaction pooler)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Supabase JWT Configuration
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
supabase.url=${SUPABASE_URL}
supabase.anon.key=${SUPABASE_ANON_KEY}

# Supabase Admin API (for user management operations)
# Get this from Supabase Dashboard > Settings > API > service_role key
# WARNING: Keep this secret! Never expose to frontend
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY:}

# CORS Configuration
cors.allowed.origins=http://localhost:3000

# PayWay Configuration
# return_url is where PayWay redirects after the user completes or cancels payment.
# The frontend handles this route and calls POST /api/tickets/verify/{paywayTranId}.
payway.return-url=http://localhost:3000/payment/verify
# TODO: Remove before going live
payway.mock-approved=true
# TODO: Set PAYWAY_MERCHANT_ID in your .env — get this from the ABA PayWay sandbox dashboard
payway.merchant-id=${PAYWAY_MERCHANT_ID}
# TODO: Set PAYWAY_API_KEY in your .env — get this from the ABA PayWay sandbox dashboard (API key, not password)
payway.api-key=${PAYWAY_API_KEY}

# Rate Limiting (requests per minute)
rate-limit.default-requests-per-minute=60
rate-limit.auth-requests-per-minute=10
rate-limit.public-requests-per-minute=30

# Logging
logging.level.com.anicon.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
