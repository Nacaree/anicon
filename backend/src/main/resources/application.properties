∫# Server Configuration
server.port=8080
spring.application.name=anicon-backend
spring.config.import=optional:file:.env[.properties]

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings — tuned for Supabase's connection limit (~60 direct, shared
# with Dashboard/Auth/triggers). Keep pool small to avoid exhausting Supabase connections.
# If using PgBouncer (port 6543), prepareThreshold=0 disables prepared statements
# which aren't supported in PgBouncer transaction mode.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Supabase JWT Configuration
supabase.jwt.secret=${SUPABASE_JWT_SECRET}
supabase.url=${SUPABASE_URL}
supabase.anon.key=${SUPABASE_ANON_KEY}

# Supabase Admin API (for user management operations)
# Get this from Supabase Dashboard > Settings > API > service_role key
# WARNING: Keep this secret! Never expose to frontend
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY:}

# CORS Configuration
# Comma-separated list of allowed origins. Override via CORS_ALLOWED_ORIGINS env var in production.
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# PayWay Configuration
# return_url is where PayWay redirects after the user completes or cancels payment.
# The frontend handles this route and calls POST /api/tickets/verify/{paywayTranId}.
payway.return-url=${PAYWAY_RETURN_URL:http://localhost:3000/payment/verify}
# Set PAYWAY_MOCK_APPROVED=false in production
payway.mock-approved=${PAYWAY_MOCK_APPROVED:true}
# TODO: Set PAYWAY_MERCHANT_ID in your .env — get this from the ABA PayWay sandbox dashboard
payway.merchant-id=${PAYWAY_MERCHANT_ID:}
# TODO: Set PAYWAY_API_KEY in your .env — get this from the ABA PayWay sandbox dashboard (API key, not password)
payway.api-key=${PAYWAY_API_KEY:}

# Stripe Configuration
# Get keys from Stripe Dashboard > Developers > API keys
# Get webhook secret from Stripe Dashboard > Webhooks > your endpoint > Signing secret
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Rate Limiting (requests per minute)
rate-limit.default-requests-per-minute=200
rate-limit.auth-requests-per-minute=30
rate-limit.public-requests-per-minute=100

# Logging — set LOG_LEVEL=INFO and SQL_LOG_LEVEL=WARN in production
logging.level.com.anicon.backend=${LOG_LEVEL:DEBUG}
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${SQL_LOG_LEVEL:TRACE}


