# Server Configuration
server.port=8080
spring.application.name=anicon-backend

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
spring.datasource.username=<YOUR_DB_USERNAME>
spring.datasource.password=<YOUR_DB_PASSWORD>
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Supabase JWT Configuration
supabase.jwt.secret=<YOUR_SUPABASE_JWT_SECRET>
supabase.url=https://rsongscpipemetlknnkc.supabase.co
supabase.anon.key=<YOUR_SUPABASE_ANON_KEY>

# CORS Configuration
cors.allowed.origins=http://localhost:3000

# Logging
logging.level.com.anicon.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
