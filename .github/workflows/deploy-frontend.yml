name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Env file lives on the VM at this path — set it up once manually
      - name: Copy env file
        run: cp /home/ubuntu/anicon-secrets/frontend.env.local $GITHUB_WORKSPACE/frontend/.env.local

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      # Sync built output to stable deploy dir (exclude node_modules — reinstalled below)
      - name: Sync to deploy directory
        run: |
          rsync -av --delete \
            --exclude='node_modules' \
            --exclude='.env.local' \
            $GITHUB_WORKSPACE/frontend/ \
            /opt/anicon/frontend/
          cp /home/ubuntu/anicon-secrets/frontend.env.local /opt/anicon/frontend/.env.local

      - name: Install production dependencies
        working-directory: /opt/anicon/frontend
        run: npm ci --omit=dev

      # pm2 reload = zero-downtime restart; falls back to start on first deploy
      - name: Reload frontend
        run: pm2 reload anicon-frontend || pm2 start /opt/anicon/frontend/ecosystem.config.js

      - name: Save PM2 process list
        run: pm2 save
